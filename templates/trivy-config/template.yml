# =============================================================================
# trivy-config — Trivy misconfig/IaC scan over a filesystem PATH (plain K8s
# manifests, Kustomize overlays, Terraform, Dockerfiles).
#
# NOTE: `trivy config` scans a filesystem path and does NOT read stdin. To scan
# rendered Helm output, write it to a dir first and point `target` there (see
# helm-charts, which overrides script: to render then scan). Emits console output
# PLUS a browsable SARIF artifact (no GitLab container_scanning report — that
# needs Ultimate; a homelab gets the console log + SARIF). Reads the CONSUMER's
# own .config/.trivyignore (repo-local). The policy bundle is cached under
# .trivycache (key trivy-db).
#
# The image MUST contain trivy (argo-apps bakes it; helm-charts/proxmox-infra
# add it to their layer).
#
# Usage:
#   include:
#     - component: source.example.com/example-org/ci-components/trivy-config@<version>
#       inputs:
#         target: apps
#         rules:
#           - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
#             changes: ["apps/**/*"]
#           - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
#             changes: ["apps/**/*"]
# =============================================================================
spec:
  inputs:
    job_name:
      default: "scan:trivy-config"
      description: "Name of the generated job."
    stage:
      default: scan
      description: "Stage the job runs in."
    image:
      default: "$CI_IMAGE"
      description: "Image carrying trivy (defaults to the consumer's $CI_IMAGE variable)."
    target:
      default: "."
      description: "Filesystem path to scan."
    severity:
      default: "HIGH,CRITICAL"
      description: "Severities to report."
    exit_code:
      default: "1"
      description: '"1" = block on findings, "0" = report-only.'
    ignorefile:
      default: .config/.trivyignore
      description: "Path to the consumer's trivy ignore file."
    rules:
      type: array
      description: "Full rules: array for the job. Default = MR + main push."
      default:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
---
"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  variables:
    TRIVY_CACHE_DIR: ".trivycache"
  cache:
    key: "trivy-db"
    paths:
      - .trivycache
  rules: $[[ inputs.rules ]]
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    # SARIF pass (always non-blocking → the artifact survives even on findings),
    # then the console pass that applies the real exit code.
    - >
      trivy config
      --severity "$[[ inputs.severity ]]"
      --exit-code 0
      --ignorefile $[[ inputs.ignorefile ]]
      --cache-dir "$TRIVY_CACHE_DIR"
      --format sarif
      --output trivy-config.sarif
      "$[[ inputs.target ]]"
    - >
      trivy config
      --severity "$[[ inputs.severity ]]"
      --exit-code "$[[ inputs.exit_code ]]"
      --ignorefile $[[ inputs.ignorefile ]]
      --cache-dir "$TRIVY_CACHE_DIR"
      "$[[ inputs.target ]]"
  artifacts:
    when: always
    paths:
      - trivy-config.sarif
    expire_in: 7 days
