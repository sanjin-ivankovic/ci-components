# =============================================================================
# trivy-image — Trivy vuln scan of a built image by immutable ref.
#
# Scans the image whose ref is read from the file the build job produced (the
# same image-ref.txt artifact cosign-sign consumes), so build → scan → sign chain
# off one artifact. Report-only by default (exit_code "0"): base-image CVEs are
# often unfixable on a homelab cadence and shouldn't block the build. Set
# exit_code "1" to gate. Console + SARIF artifact, full vuln DB cached under
# .trivycache.
#
# The freshly-built image is in the local docker daemon (the runner binds the
# host socket), so `trivy image <ref>` reads it without a registry pull; the
# registry login is best-effort (|| true) for the rare cold-cache case.
#
# Point `needs_job` at the build job and set `stage` at/after its stage.
#
# Usage:
#   include:
#     - component: source.example.com/example-org/ci-components/trivy-image@<version>
#       inputs:
#         job_name: "scan:trivy-pihole"
#         needs_job: "build:pihole"
#         stage: image
#         rules:
#           - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
#             changes: ["docker/pihole/**/*"]
# =============================================================================
spec:
  inputs:
    job_name:
      default: "scan:trivy-image"
      description: "Name of the generated job."
    stage:
      default: image
      description: "Stage the job runs in (at/after the build job's stage)."
    image:
      default: "$CI_IMAGE"
      description: "Image carrying trivy (defaults to the consumer's $CI_IMAGE variable)."
    ref_file:
      default: image-ref.txt
      description: "Artifact file holding the image ref to scan."
    needs_job:
      description: "Build job to pull the ref_file artifact from."
    severity:
      default: "CRITICAL"
      description: "Severities to report."
    exit_code:
      default: "0"
      description: '"1" = block on findings, "0" = report-only.'
    ignorefile:
      default: .config/.trivyignore
      description: "Path to the consumer's trivy ignore file."
    rules:
      type: array
      description: "Full rules: array for the job. Default = main push + scheduled rebuilds."
      default:
        - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "rebuild"'
        - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
---
"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  needs:
    - job: $[[ inputs.needs_job ]]
      artifacts: true
  rules: $[[ inputs.rules ]]
  variables:
    TRIVY_CACHE_DIR: ".trivycache"
    DOCKER_CONFIG: $CI_PROJECT_DIR/.docker
  cache:
    key: "trivy-db"
    paths:
      - .trivycache
  before_script:
    - mkdir -p "$DOCKER_CONFIG"
    - >
      echo "$HARBOR_PASSWORD" | trivy registry login "$HARBOR_HOST"
      -u "$HARBOR_USERNAME" --password-stdin || true
  script:
    - REF=$(cat "$[[ inputs.ref_file ]]")
    - echo "=== trivy image $REF ==="
    - >
      trivy image
      --severity "$[[ inputs.severity ]]"
      --exit-code 0
      --ignorefile $[[ inputs.ignorefile ]]
      --cache-dir "$TRIVY_CACHE_DIR"
      --format sarif
      --output trivy-image.sarif
      "$REF"
    - >
      trivy image
      --severity "$[[ inputs.severity ]]"
      --exit-code "$[[ inputs.exit_code ]]"
      --ignorefile $[[ inputs.ignorefile ]]
      --cache-dir "$TRIVY_CACHE_DIR"
      "$REF"
  artifacts:
    when: always
    paths:
      - trivy-image.sarif
    expire_in: 7 days
