# =============================================================================
# lint-yaml — yamllint over the repo, gated to YAML changes. Reads the
# CONSUMER's own .config/.yamllint when present; falls back to the shared
# default baked into ci-base at /opt/ci/config/.yamllint.
#
# Usage:
#   include:
#     - component: source.example.com/example-org/ci-components/lint-yaml@<version>
#
# The gate (MR + main push on YAML files) is baked into the body. A consumer
# that needs different gating overrides the generated job's rules: directly.
#
# Requires yamllint in the image (ci-base has it).
# =============================================================================
spec:
  inputs:
    job_name:
      default: "lint:yaml"
      description: "Name of the generated job."
    stage:
      default: lint
      description: "Stage the job runs in."
    image:
      default: "$CI_IMAGE"
      description: "Image carrying yamllint (defaults to the consumer's $CI_IMAGE variable)."
    config:
      default: .config/.yamllint
      description: "Path to the consumer's yamllint config."
---
"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.yaml"
        - "**/*.yml"
        - .config/.yamllint
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - "**/*.yaml"
        - "**/*.yml"
        - .config/.yamllint
  script:
    # Repo-local config wins; the baked ci-base default is the fallback.
    - CONF="$[[ inputs.config ]]"; [ -f "$CONF" ] || CONF=/opt/ci/config/.yamllint
    - yamllint -c "$CONF" .
