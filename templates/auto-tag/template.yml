# =============================================================================
# auto-tag — compute the next SemVer from Conventional Commits and push the tag.
#
# On a main push, reads the commits since the latest SemVer tag and bumps:
#   `!` / `BREAKING CHANGE:` -> major, `feat:` -> minor, anything else -> patch.
# Cold-start (no matching tag yet) seeds `seed`. Skips cleanly when there are
# no new commits. The token-authenticated tag push starts a tag pipeline in the
# consumer repo — what runs there stays consumer-side (ci-components publishes
# a Catalog release object; kryptos runs goreleaser).
#
# `tag_prefix` selects the tag scheme: "" for bare Catalog SemVer (`1.2.3`),
# "v" for Go-style tags (`v1.2.3`).
#
# Usage (ci-components itself):
#   include:
#     - component: source.example.com/example-org/ci-components/auto-tag@<version>
#       inputs:
#         token: "$CI_COMPONENTS_RELEASE_TOKEN"
#
# Usage (kryptos):
#   include:
#     - component: source.example.com/example-org/ci-components/auto-tag@<version>
#       inputs:
#         tag_prefix: "v"
#         token: "$KRYPTOS_RELEASE_TOKEN"
#
# Secrets: the consumer passes its own release token via `token` — a masked +
# protected project CI/CD variable holding a write_repository token whose role
# may CREATE protected release tags. Pass the VARIABLE REFERENCE (single-quoted
# `$NAME`), never a literal value.
# =============================================================================
spec:
  inputs:
    job_name:
      default: "auto-tag"
      description: "Name of the generated job."
    stage:
      default: release
      description: "Stage the job runs in."
    image:
      default: "$CI_IMAGE"
      description: "Image carrying git + bash (defaults to the consumer's $CI_IMAGE variable)."
    tag_prefix:
      default: ""
      description: 'Tag prefix: "" for bare SemVer (CI/CD Catalog), "v" for v-prefixed tags.'
    seed:
      default: "1.0.0"
      description: "First version to tag when no matching SemVer tag exists yet."
    token:
      description: "Variable reference (e.g. $MY_RELEASE_TOKEN) holding the write_repository token that pushes the tag."
    rules:
      type: array
      description: "Full rules: array for the job. Default = main push."
      default:
        - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
---
"$[[ inputs.job_name ]]":
  stage: $[[ inputs.stage ]]
  image: $[[ inputs.image ]]
  rules: $[[ inputs.rules ]]
  variables:
    GIT_DEPTH: "0"   # need full history + all tags to compute the next bump
    GITLAB_TOKEN: $[[ inputs.token ]]
    TAG_PREFIX: "$[[ inputs.tag_prefix ]]"
    SEED_VERSION: "$[[ inputs.seed ]]"
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git config --global user.name "maintainer"
    - git config --global user.email "maintainer@example.com"
    - git fetch --tags --force
    - |
      set -euo pipefail
      LATEST_TAG=$(git tag -l --sort=-v:refname | grep -E "^${TAG_PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" | head -n1 || true)
      if [ -z "$LATEST_TAG" ]; then
        NEXT="$SEED_VERSION"
        echo "=== no ${TAG_PREFIX}SemVer tag yet; seeding ${TAG_PREFIX}${NEXT} ==="
      else
        echo "=== latest tag: $LATEST_TAG ==="
        MSGS=$(git log "$LATEST_TAG..HEAD" --pretty=format:'%s%n%b' || true)
        if [ -z "$MSGS" ]; then
          echo "=== no commits since $LATEST_TAG; nothing to tag ==="
          exit 0
        fi
        echo "=== commits since $LATEST_TAG: ==="
        git log "$LATEST_TAG..HEAD" --oneline
        if echo "$MSGS" | grep -qE '^[a-z]+(\([^)]+\))?!:|BREAKING CHANGE:'; then
          BUMP=major
        elif echo "$MSGS" | grep -qE '^feat(\([^)]+\))?:'; then
          BUMP=minor
        else
          BUMP=patch
        fi
        echo "=== bump type: $BUMP ==="
        VERSION="${LATEST_TAG#"$TAG_PREFIX"}"
        IFS='.' read -r MAJ MIN PAT <<< "$VERSION"
        case "$BUMP" in
          major) MAJ=$((MAJ+1)); MIN=0; PAT=0 ;;
          minor) MIN=$((MIN+1)); PAT=0 ;;
          patch) PAT=$((PAT+1)) ;;
        esac
        NEXT="${MAJ}.${MIN}.${PAT}"
      fi
      echo "=== next tag: ${TAG_PREFIX}${NEXT} ==="
      AUTHED_REMOTE="https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git tag "${TAG_PREFIX}${NEXT}" -m "${TAG_PREFIX}${NEXT}"
      git push "$AUTHED_REMOTE" "${TAG_PREFIX}${NEXT}"
      echo "=== pushed ${TAG_PREFIX}${NEXT} — the tag pipeline takes it from here ==="
